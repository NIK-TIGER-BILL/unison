name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift-test:
    # Package.swift needs swift-tools 6.2 + the macOS 26 SDK (Liquid
    # Glass APIs), so the job must run on the macos-26 image. Its
    # default Xcode is always a 26.x release — no xcode-select pin;
    # pinning a specific minor breaks when the image rotates it out.
    runs-on: macos-26
    # Backstop only — the suite runs in well under a minute. (It used to
    # wedge until the 6 h limit: a deadlock in the mock WebSocket server's
    # test helper parked a continuation that never resumed; fixed in
    # MockOpenAIRealtimeServer with one-shot continuations.)
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain versions
        run: |
          xcode-select -p
          swift --version
      - name: swift build
        run: swift build
      - name: swift test
        # `--no-parallel`: swift-testing parallelises by default (the
        # `--parallel` flag is an XCTest-ism) and its parallel runner
        # deadlocks this suite. Serial runs the full suite in ~40 s.
        run: swift test --no-parallel
      # Smoke-test the release bundler so packaging breaks surface on
      # push, not at `git tag` time. Ad-hoc, debug config (reuses the
      # build above); no secrets required.
      - name: Bundle smoke (ad-hoc)
        run: CONFIG=debug ./scripts/bundle_app.sh
      - name: Verify bundle
        run: |
          test -f build/Unison.app/Contents/MacOS/Unison
          codesign -dv build/Unison.app

  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      # `scripts/lint.sh` downloads SwiftLint + Periphery into
      # `scripts/.bin/` on first run, so no Homebrew install step
      # is needed. SwiftLint runs `--strict` and fails the job on
      # any finding; Periphery is informational.
      - name: Build (Periphery needs an index)
        run: swift build
      - name: Lint
        run: scripts/lint.sh
