name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift-test:
    # Package.swift needs swift-tools 6.2 + the macOS 26 SDK (Liquid
    # Glass APIs), so the job must run on the macos-26 image. Its
    # default Xcode is always a 26.x release — no xcode-select pin;
    # pinning a specific minor breaks when the image rotates it out.
    runs-on: macos-26
    # Backstop so a runner stall can never burn the full 6 h job budget;
    # scripts/ci-test.sh handles stalls in-band (kill + retry) well under
    # this, and the suite itself runs in <1 min.
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain versions
        run: |
          xcode-select -p
          swift --version
      - name: swift build
        run: swift build
      - name: swift test
        # Runs `swift test --no-parallel` (swift-testing parallelises by
        # default — the `--parallel` flag is an XCTest-ism — and its
        # PARALLEL runner deadlocks this suite outright). Even serial, the
        # runner intermittently STALLS: the suite stops progressing with
        # the main thread idle in `swift_task_asyncMainDrainQueue` (a
        # scheduler heisenbug in the runner, not our code — a clean re-run
        # passes). scripts/ci-test.sh caps each attempt and retries only on
        # a stall, never on a real failure. See the script header.
        run: scripts/ci-test.sh

  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      # `scripts/lint.sh` downloads SwiftLint + Periphery into
      # `scripts/.bin/` on first run, so no Homebrew install step
      # is needed. SwiftLint runs `--strict` and fails the job on
      # any finding; Periphery is informational.
      - name: Build (Periphery needs an index)
        run: swift build
      - name: Lint
        run: scripts/lint.sh
