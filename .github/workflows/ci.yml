name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift-test:
    # Package.swift needs swift-tools 6.2 + the macOS 26 SDK (Liquid
    # Glass APIs), so the job must run on the macos-26 image. Its
    # default Xcode is always a 26.x release — no xcode-select pin;
    # pinning a specific minor breaks when the image rotates it out.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Toolchain versions
        run: |
          xcode-select -p
          swift --version
      - name: swift build
        run: swift build
      - name: swift test
        # `--no-parallel` is load-bearing, NOT a speed knob: swift-testing
        # parallelises by DEFAULT (the `--parallel` flag is an XCTest-ism),
        # and its parallel runner intermittently deadlocks this suite —
        # a cluster of real-sleep @MainActor tests plus the mock-WS tests
        # stops making progress while the main thread sits idle (seen ~1 in
        # 3 runs locally; in CI it wedged until the 6 h job timeout). Serial
        # runs the whole suite in well under a minute, so we lose nothing.
        run: swift test --no-parallel

  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      # `scripts/lint.sh` downloads SwiftLint + Periphery into
      # `scripts/.bin/` on first run, so no Homebrew install step
      # is needed. SwiftLint runs `--strict` and fails the job on
      # any finding; Periphery is informational.
      - name: Build (Periphery needs an index)
        run: swift build
      - name: Lint
        run: scripts/lint.sh
