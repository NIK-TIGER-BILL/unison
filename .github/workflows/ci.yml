name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  swift-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app
      - name: swift build
        run: swift build
      - name: swift test
        run: swift test --parallel
