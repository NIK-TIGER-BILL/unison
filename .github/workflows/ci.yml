name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'
      - name: swift build
        run: swift build
      - name: swift test
        run: swift test --parallel
      # Smoke-test the release bundler on every push so packaging
      # regressions surface here, not at `git tag` time. Ad-hoc signed,
      # debug config (fast); no secrets required.
      - name: Bundle smoke (ad-hoc)
        run: CONFIG=debug ./scripts/bundle_app.sh
      - name: Verify bundle
        run: |
          test -f build/Unison.app/Contents/MacOS/Unison
          codesign -dv build/Unison.app

  lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'
      # `scripts/lint.sh` downloads SwiftLint + Periphery into
      # `scripts/.bin/` on first run, so no Homebrew install step
      # is needed. SwiftLint runs `--strict` and fails the job on
      # any finding; Periphery is informational.
      - name: Build (Periphery needs an index)
        run: swift build
      - name: Lint
        run: scripts/lint.sh
