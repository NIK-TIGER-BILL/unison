name: Release

on:
  push:
    tags:
      - 'v*'

# `softprops/action-gh-release` creates the release and uploads the DMG —
# that needs a writable GITHUB_TOKEN even when the repo default is read-only.
permissions:
  contents: write

jobs:
  build-release:
    # swift-tools 6.2 + macOS 26 SDK — the macos-26 image's default Xcode
    # is always a 26.x release; no xcode-select pin (pinning a minor breaks
    # when the image rotates it out). See ci.yml for the runner note.
    runs-on: macos-26
    env:
      # Secrets map to env so steps can gate on presence (the env context
      # is usable in `if:`; the secrets context is not). Empty when unset →
      # build_release.sh degrades to an ad-hoc, unnotarized DMG, so the
      # pipeline still runs before an Apple account / secrets exist.
      CERT_P12_BASE64: ${{ secrets.CERT_P12_BASE64 }}
      CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
      DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
      TEAM_ID: ${{ secrets.TEAM_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive version from tag
        # bundle_app.sh stamps these into the *bundled* Info.plist (the
        # repo copy stays a 1.0 placeholder). Without it every release
        # ships an app self-identifying as 1.0 — wrong in crash reports and
        # the Diagnostic sheet. CFBundleVersion uses the run number:
        # monotonic, and no full-history fetch needed.
        run: |
          echo "MARKETING_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "BUILD_VERSION=${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Import signing certificate
        if: env.CERT_P12_BASE64 != ''
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          # A fresh keychain auto-locks after 300 s; the release build takes
          # longer, so codesign would hit a locked keychain ("User
          # interaction is not allowed"). 6 h timeout.
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build release
        run: ./scripts/build_release.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/Unison.dmg
            build/Unison.dmg.sha256

      - name: Clean up keychain
        if: always() && env.CERT_P12_BASE64 != ''
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
