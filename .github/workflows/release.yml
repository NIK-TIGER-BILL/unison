name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # softprops/action-gh-release needs to create the Release

jobs:
  build-release:
    runs-on: macos-26
    env:
      # Secrets map to env so steps can gate on presence (env context is
      # usable in `if:`; the `secrets` context is not). Empty when unset →
      # build_release.sh degrades to an ad-hoc, unnotarized DMG.
      CERT_P12_BASE64: ${{ secrets.CERT_P12_BASE64 }}
      CERT_PASSWORD: ${{ secrets.CERT_PASSWORD }}
      DEVELOPER_ID: ${{ secrets.DEVELOPER_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
      TEAM_ID: ${{ secrets.TEAM_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history → stable `git rev-list --count` build number

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26'

      - name: Derive version from tag
        run: |
          echo "MARKETING_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          echo "BUILD_VERSION=$(git rev-list --count HEAD)" >> "$GITHUB_ENV"

      - name: Import signing certificate
        if: env.CERT_P12_BASE64 != ''
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build release
        run: ./scripts/build_release.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            build/Unison.dmg
            build/Unison.dmg.sha256

      - name: Clean up keychain
        if: always() && env.CERT_P12_BASE64 != ''
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
